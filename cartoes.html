<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor de Cartões - Equipe RATS</title>
    <style src="style.css"></style>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>
    <header class="bg-dark text-white p-3 text-center">
        <h1>EQUIPE RATS - Editor de Cartões</h1>
    </header>

    <main class="container my-4">

        <div class="row">

            <!-- FORMULÁRIO -->
            <div class="col-md-6">
                <h2>Editar Cartão</h2>

                <label class="form-label">Texto</label>
                <input type="text" id="texto" class="form-control mb-2">

                <label class="form-label">Cor do texto</label>
                <input type="color" id="corTexto" class="form-control form-control-color mb-2">

                <label class="form-label">Cor de fundo</label>
                <input type="color" id="corFundo" class="form-control form-control-color mb-2">

                <label class="form-label">Tamanho do texto</label>
                <input type="range" id="tamanho" min="12" max="40" value="16" class="form-range">

                <label class="form-label">Imagem (URL)</label>
                <input type="url" id="imagem" class="form-control mb-2">

                <hr>

                <label class="form-label">Adicionar elemento</label>
                <select id="tipoElemento" class="form-select mb-2">
                    <option value="">Selecione</option>
                    <option value="titulo">Título</option>
                    <option value="paragrafo">Parágrafo</option>
                    <option value="caixa">Caixa destacada</option>
                </select>

                <button id="addElemento" class="btn btn-danger w-100">
                    Adicionar ao cartão
                </button>

            </div>

            <!-- CARTÃO -->
            <div class="col-md-6">
                <h2>Pré-visualização</h2>

                <div id="cartao" class="cartao">
                    <div class="elemento" contenteditable="true">
                        Clique aqui e edite
                    </div>
                </div>
            </div>

        </div>

    </main>

    <footer class="bg-dark text-white text-center p-3">
        Equipe RATS
    </footer>

    <script src="script.js"></script>

</body>
</html>
