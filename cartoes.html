<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Equipe Rats</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <header class="bg-dark text-white p-3 text-center">
            <h1>EQUIPE RATS - Trabalhos de DI</h1>
        </header>
        <nav class="navbar navbar-expand-lg navbar-dark bg-secondary">
            <div class="container">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link active" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="cartoes.html">T1 - Editor Cartões</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">T2 - </a></li>
                    <li class="nav-item"><a class="nav-link" href="#">T3 - </a></li>
                </ul>
            </div>
        </nav>
    </header>

    <main class="container my-4">

        <div class="row">

            <!-- FORMULÁRIO -->
            <div class="col-md-6">
                <h3>Editar Cartão</h3>

                <form id="formCartao">

                    <label for="texto" class="form-label">Texto</label>
                    <input type="text" id="texto" class="form-control mb-2" maxlength="50" placeholder="Digite uma mensagem">

                    <label for="corTexto" class="form-label">Cor do texto</label>
                    <input type="color" id="corTexto" class="form-control form-control-color mb-2">

                    <label for="corFundo" class="form-label">Cor de fundo</label>
                    <input type="color" id="corFundo" class="form-control form-control-color mb-2">

                    <label for="tamanho" class="form-label">Tamanho do texto</label>
                    <input type="range" id="tamanho" min="12" max="40" value="16" class="form-range">

                    <label for="imagem" class="form-label">Imagem (URL)</label>
                    <input type="url" id="imagem" class="form-control mb-2" placeholder="https://...">

                    <hr>

                    <!-- NOVO: adicionar elementos -->
                    <label for="tipoElemento" class="form-label">Adicionar elemento</label>
                    <select id="tipoElemento" class="form-select mb-2">
                        <option value="">Selecione</option>
                        <option value="titulo">Título</option>
                        <option value="paragrafo">Parágrafo</option>
                        <option value="caixa">Caixa destacada</option>
                    </select>

                    <button type="button" id="addElemento" class="btn btn-danger w-100">
                        Adicionar ao cartão
                    </button>

                </form>
            </div>

            <!-- CARTÃO -->
            <div class="col-md-6">
                <h3>Pré-visualização</h3>

                <div id="cartao" class="cartao">
                    <p id="textoCartao">Seu texto aqui</p>
                    <img id="imgCartao" src="" alt="">
                </div>
            </div>

        </div>

    </main>

    <footer class="bg-dark text-white text-center p-3">
        <p>Equipe RATS</p>
    </footer>

    <script src="script.js"></script>

</body>
</html>
